providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r backend/requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  ". /opt/venv/bin/activate && python build.py",
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && /opt/venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -"

[variables]
PYTHON_VERSION = "3.11"
